query CartInput {
  cart {
    lines {
      id
      quantity
      attribute(key: "_bxgy") {
        value
      }
      rule: attribute(key: "_bxgy_rule_id") {
        value
      }
      cost {
        subtotalAmount {
          amount
        }
      }
      merchandise {
        ... on ProductVariant {
          id
          product {
            id
          }
        }
      }
    }
  }
  discount {
    metafield(namespace: "upsale", key: "config") {
      value
    }
  }
}
